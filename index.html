<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To 王天鹭：生日快乐！</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', 'Microsoft YaHei', serif;
            background-color: #050510; 
            /* 背景图：迪士尼城堡 */
            background: linear-gradient(rgba(10, 10, 30, 0.6), rgba(20, 15, 40, 0.8)), 
                        url('disney_castle.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            mix-blend-mode: screen;
        }

        #intro-screen, #outro-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            transition: opacity 1.5s ease;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
        
        #outro-screen {
            opacity: 0; 
            pointer-events: none;
            top: 55%; 
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 26px;
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.3), rgba(255, 100, 255, 0.3), rgba(50, 200, 255, 0.3));
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #fff;
            padding: 15px 45px;
            font-size: 18px;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
        }

        .subtitle {
            font-size: 1.4rem;
            color: rgba(255, 240, 250, 0.8);
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'KaiTi', '楷体', 'STKaiti', serif; 
        }

        /* 音乐控制按钮样式 */
        #music-control {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 20;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 50%;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            display: none; /* 初始隐藏，点击开始后显示 */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            user-select: none;
        }

        #music-control:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1) rotate(5deg);
        }

        #music-icon {
            font-size: 24px;
            line-height: 1;
            display: block;
        }

    </style>
</head>
<body>

    <audio id="bgm" src="uchiage_hanabi.mp3" loop preload="auto"></audio>

    <div id="music-control" onclick="toggleMusic()" title="点击开启/关闭音乐">
        <span id="music-icon">🎵</span>
    </div>

    <div id="intro-screen">
        <h1>准备好了吗？</h1>
        <button class="start-btn" onclick="startShow()">触碰星空，点亮花火</button>
    </div>
    
    <div id="outro-screen">
        <div class="subtitle" style="font-size: 120px;">生日快乐！🎂</div>
    </div>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let fireworks = [];
        let isShowRunning = false;
        
        let textPoints = []; 
        let textPointIndex = 0; 

        // 音乐控制逻辑
        const bgm = document.getElementById('bgm');
        const musicControl = document.getElementById('music-control');
        const musicIcon = document.getElementById('music-icon');

        function toggleMusic() {
            if (bgm.muted) {
                bgm.muted = false;
                musicIcon.innerText = '🎵';
                musicControl.style.boxShadow = '0 0 15px rgba(255, 255, 255, 0.6)';
            } else {
                bgm.muted = true;
                musicIcon.innerText = '🔇';
                musicControl.style.boxShadow = 'none';
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function initTextCoordinates() {
            let textCanvas = document.createElement('canvas');
            textCanvas.width = width;
            textCanvas.height = height;
            let tCtx = textCanvas.getContext('2d');

            let fontSize = width < 768 ? Math.floor(width / 13) : 50;
            tCtx.font = "bold " + fontSize + "px 'KaiTi', '楷体', 'STKaiti', serif";
            tCtx.fillStyle = '#ffffff';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';

            let line1 = "生日快乐王天鹭";
            let line2 = "祝你天天开心，诸事顺遂！";
            tCtx.fillText(line1, width / 2, height * 0.25);
            tCtx.fillText(line2, width / 2, height * 0.35);

            let imgData = tCtx.getImageData(0, 0, width, height);
            let data = imgData.data;

            let step = width < 768 ? 2 : 3; 
            textPoints = [];
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let index = (y * width + x) * 4;
                    if (data[index + 3] > 128) {
                        textPoints.push({x: x, y: y});
                    }
                }
            }
            textPoints.sort(() => Math.random() - 0.5);
            textPointIndex = 0;
        }

        const preRenderedStars = {};
        function initPreRender() {
            const colors = ['#ffe6a0', '#a0d8ff', '#ffffff', '#ffb6c1', '#ff4757', '#1e90ff', '#ffa502'];
            colors.forEach(color => {
                let tempCanvas = document.createElement('canvas');
                let size = 40; 
                tempCanvas.width = size; 
                tempCanvas.height = size;
                let tCtx = tempCanvas.getContext('2d');
                let cx = size / 2, cy = size / 2;
                tCtx.beginPath();
                for (let i = 0; i < 4; i++) {
                    tCtx.lineTo(cx + Math.cos(i * Math.PI / 2) * 15, cy + Math.sin(i * Math.PI / 2) * 15);
                    tCtx.lineTo(cx + Math.cos((i + 0.5) * Math.PI / 2) * 2, cy + Math.sin((i + 0.5) * Math.PI / 2) * 2);
                }
                tCtx.closePath();
                tCtx.shadowColor = color;
                tCtx.shadowBlur = 10; 
                tCtx.fillStyle = color;
                tCtx.fill();
                preRenderedStars[color] = tempCanvas;
            });
        }
        initPreRender();

        const colorPalettes = [
            { stars: ['#ffb6c1', '#ffe6a0', '#ffffff'], hues: [340, 350, 40, 50] },
            { stars: ['#ff4757', '#1e90ff', '#ffa502'], hues: [355, 5, 210, 35, 45] },
            { stars: ['#a0d8ff', '#1e90ff', '#ffffff'], hues: [200, 210, 220] },
            { stars: ['#ffe6a0', '#ffffff'], hues: [40, 45, 50] },
            { stars: ['#ffb6c1', '#ffffff'], hues: [300, 310, 320, 340] }
        ];

        class Firework {
            constructor(sx, sy, tx, ty, isFinale = false) {
                this.x = sx; this.y = sy; this.sx = sx; this.sy = sy;
                this.tx = tx; this.ty = ty;
                this.isFinale = isFinale;
                this.distanceToTarget = Math.sqrt(Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2));
                this.distanceTraveled = 0;
                this.coordinates = [];
                this.coordinateCount = 4;
                while (this.coordinateCount--) this.coordinates.push([this.x, this.y]);
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = isFinale ? 4 : 3; 
                this.acceleration = 1.03;
                
                this.palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
                this.hue = this.palette.hues[Math.floor(Math.random() * this.palette.hues.length)]; 
                this.brightness = Math.random() * 20 + 60;
            }
            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.acceleration;
                let vx = Math.cos(this.angle) * this.speed;
                let vy = Math.sin(this.angle) * this.speed;
                this.distanceTraveled = Math.sqrt(Math.pow(this.x - this.sx, 2) + Math.pow(this.y - this.sy, 2));

                if (this.distanceTraveled >= this.distanceToTarget) {
                    if (this.isFinale) {
                        createNormalExplosion(this.tx, this.ty, this.palette); 
                        createTextExplosion(this.tx, this.ty, this.palette);
                    } else {
                        createNormalExplosion(this.tx, this.ty, this.palette);
                    }
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx; this.y += vy;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsl(${this.hue}, 100%, ${this.brightness}%)`;
                ctx.lineWidth = this.isFinale ? 3 : 2.5;
                ctx.stroke();
            }
        }

        class NormalParticle {
            constructor(x, y, isStar, palette) {
                this.x = x; this.y = y; this.isStar = isStar;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 15 + 5; 
                this.friction = 0.95;
                this.gravity = 0.7;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;

                if (this.isStar) {
                    this.colorKey = palette.stars[Math.floor(Math.random() * palette.stars.length)];
                    this.scale = Math.random() * 0.4 + 0.3;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                    this.gravity = 0.4;
                } else {
                    let baseHue = palette.hues[Math.floor(Math.random() * palette.hues.length)];
                    this.hue = baseHue + (Math.random() * 20 - 10); 
                    this.brightness = Math.random() * 30 + 55;
                    this.coordinates = [];
                    this.coordinateCount = 5;
                    while (this.coordinateCount--) this.coordinates.push([this.x, this.y]);
                }
            }
            update(index) {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                if (this.isStar) this.rotation += this.rotationSpeed;
                else { this.coordinates.pop(); this.coordinates.unshift([this.x, this.y]); }
                if (this.alpha <= this.decay) particles.splice(index, 1);
            }
            draw() {
                if (this.isStar) {
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.scale(this.scale, this.scale);
                    let blink = 0.5 + Math.abs(Math.sin(this.alpha * 10)) * 0.5;
                    ctx.globalAlpha = this.alpha * blink;
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.drawImage(preRenderedStars[this.colorKey], -20, -20); ctx.restore();
                } else {
                    ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                    ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                    ctx.lineTo(this.x, this.y);
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.strokeStyle = `hsl(${this.hue}, 80%, ${this.brightness}%)`; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
                }
            }
        }

        class TextParticle {
            constructor(sx, sy, tx, ty, palette) {
                this.x = sx; this.y = sy; 
                this.tx = tx; this.ty = ty; 
                
                this.framesToArrive = 40; 
                this.vx = (tx - sx) / this.framesToArrive; 
                this.vy = (ty - sy) / this.framesToArrive;
                this.arrived = false;
                
                this.stayFrames = 120; 
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005; 
                this.colorKey = palette.stars[Math.floor(Math.random() * palette.stars.length)];
                this.scale = width < 768 ? 0.1 : 0.13; 
            }
            update(index) {
                if (!this.arrived) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.framesToArrive--;
                    if (this.framesToArrive <= 0) {
                        this.arrived = true;
                        this.x = this.tx;
                        this.y = this.ty;
                    }
                } else {
                    if (this.stayFrames > 0) {
                        this.stayFrames--;
                    } else {
                        this.y += 0.4; 
                        this.alpha -= this.decay;
                    }
                }
                if (this.alpha <= 0) particles.splice(index, 1);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                let blink = this.arrived ? (0.9 + Math.sin(this.x * 0.1 + Date.now() * 0.008) * 0.25) : 1;
                ctx.globalAlpha = this.alpha * blink;
                ctx.globalCompositeOperation = 'lighter';
                ctx.drawImage(preRenderedStars[this.colorKey], -20, -20);
                ctx.restore();
            }
        }

        function createNormalExplosion(x, y, palette) {
            let lineCount = Math.floor(Math.random() * 50 + 60);
            let starCount = Math.floor(Math.random() * 15 + 10);
            for(let i=0; i<lineCount; i++) particles.push(new NormalParticle(x, y, false, palette));
            for(let i=0; i<starCount; i++) particles.push(new NormalParticle(x, y, true, palette));
        }

        function createTextExplosion(sx, sy, palette) {
            let pointsPerFirework = Math.ceil(textPoints.length / 5); 
            for (let i = 0; i < pointsPerFirework; i++) { 
                if (textPointIndex >= textPoints.length) break;
                let target = textPoints[textPointIndex];
                textPointIndex++;
                particles.push(new TextParticle(sx, sy, target.x, target.y, palette));
            }
        }

        function launchFirework(isFinale = false) {
            if (!isShowRunning && !isFinale) return;
            let startX = Math.random() * width * 0.8 + width * 0.1;
            let endX = startX + (Math.random() * 150 - 75); 
            let endY = Math.random() * height * 0.3 + height * 0.1;

            if (isFinale) {
                startX = width / 2 + (Math.random() * 200 - 100);
                endX = width / 2 + (Math.random() * 100 - 50);
                endY = height * 0.3 + (Math.random() * 100 - 50);
            }
            fireworks.push(new Firework(startX, height, endX, endY, isFinale));
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'source-over';
            let i = fireworks.length; while (i--) { fireworks[i].draw(); fireworks[i].update(i); }
            let j = particles.length; while (j--) { particles[j].draw(); particles[j].update(j); }
        }
        loop();

        function startShow() {
            initTextCoordinates();

            // 播放音乐并显示控制按钮
            bgm.play().catch(e => console.log("浏览器限制自动播放，请手动点击交互", e));
            musicControl.style.display = 'block';

            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; }, 1500);
            
            isShowRunning = true;
            let showDuration = 16000; 
            let startTime = Date.now();
            
            function scheduleNextLaunch() {
                if (!isShowRunning) return;
                let elapsed = Date.now() - startTime;
                if (elapsed < showDuration) {
                    launchFirework();
                    let randomDelay = 900 + (Math.random() * 600 - 300);
                    setTimeout(scheduleNextLaunch, randomDelay);
                } else {
                    triggerFinale();
                }
            }
            setTimeout(launchFirework, 500);
            setTimeout(scheduleNextLaunch, 1500);

            function triggerFinale() {
                isShowRunning = false;
                for(let i=0; i<5; i++) {
                    launchFirework(true); 
                }
                
                setTimeout(() => {
                    document.getElementById('outro-screen').style.opacity = '1';
                }, 6000);
            }
        }
    </script>
</body>

</html>
